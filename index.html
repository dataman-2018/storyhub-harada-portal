<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryHub × 原田朋事務所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans JP", sans-serif;
    background: #0d1117;
    color: #fafafa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .logo {
    font-family: "DM Serif Display", serif;
    font-size: 18px;
    color: rgba(250,250,250,0.4);
    letter-spacing: 0.02em;
    margin-bottom: 48px;
  }
  h1 {
    font-family: "DM Serif Display", serif;
    font-size: clamp(26px, 4vw, 40px);
    line-height: 1.3;
    text-align: center;
    max-width: 600px;
    margin-bottom: 16px;
    font-weight: 400;
  }
  h1 em {
    font-style: italic;
    color: rgba(250,250,250,0.55);
  }
  .sub {
    font-size: 14px;
    color: rgba(250,250,250,0.5);
    text-align: center;
    max-width: 420px;
    line-height: 1.8;
    margin-bottom: 56px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 640px;
    margin-bottom: 56px;
  }
  .cards a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
  }
  .cards a:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.16);
  }
  .card-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(250,250,250,0.35);
    margin-bottom: 10px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 500;
    color: #fafafa;
  }
  .meta {
    font-size: 12px;
    color: rgba(250,250,250,0.25);
    text-align: center;
    line-height: 1.8;
  }

  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="logo">StoryHub</div>
  <h1>ブランドの言葉が、<br>現場で<em>息をし始める</em>まで。</h1>
  <p class="sub">原田朋事務所さまへの協業提案資料です。</p>
  <div class="cards">
    <a href="/about">
      <div class="card-label">About StoryHub</div>
      <div class="card-name">StoryHubとは？</div>
    </a>
    <a href="/lp">
      <div class="card-label">Landing Page</div>
      <div class="card-name">ブランドストーリースタジオ</div>
    </a>
    <a href="/ops">
      <div class="card-label">Operations</div>
      <div class="card-name">運用・協業パターン</div>
    </a>
  </div>

  <div class="meta">StoryHub株式会社 | 2026年4月 | 本資料は商談用非公開資料です</div>
</body>
</html>
